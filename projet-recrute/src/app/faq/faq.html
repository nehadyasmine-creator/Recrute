<div class="faq-container">
  <h1>F.A.Q.</h1>
  <p>Trouvez ici toutes les réponses à vos questions sur Recrute!</p>

  <div class="faq-list">
    @for (item of faqs; track $index) {
      <div class="faq-box" [class.opened]="openedIndex === $index">
        <div class="faq-header" (click)="toggle($index)">
          <span class="question">{{ item.q }}</span>
          <button class="toggle-btn">
            <i class="bi bi-chevron-down" [class.rotated]="openedIndex === $index"></i> </button>
        </div>

        <div class="faq-body">
          <div class="answer-content">
            {{ item.r }}
          </div>
        </div>
      </div>
    }
  </div>

  <div class="contenu">
    Nous n'avons pas répondu à votre question ?
    <button style="margin-top:20px;" routerLink="/contactez-nous" class = "btn btn-light">Contactez-nous !</button>
</div>

</div>
