<button routerLink="/" type="button" class="btn btn-light" style="margin-left:2.6%;">
    Retour à la page d'accueil
</button>

<div class="inscription_employeur_content"
    style="align-items:center; display:flex; flex-direction:column; color:white; margin-top:2.5%;">

    <div class="inscription-card">
        <h4>Création d'un compte employeur</h4>

        <form (ngSubmit)="onRegister()" style="width:70%;">

            <div class="inputs-group mb-5">

                <div class="form-group mb-3">
                    <label for="entreprise">Nom de l'entreprise</label>
                    <input type="text" name="entreprise" [(ngModel)]="employeurData.entreprise" class="form-control" id="entreprise" placeholder="Nom de l'entreprise">
                </div>

                <div class="form-group mb-3">
                    <label for="siren">SIREN</label>
                    <input type="text" name="siren" [(ngModel)]="employeurData.siren" class="form-control" id="siren" placeholder="123 456 789 00000">
                </div>

                <div class="form-group mb-3">
                    <label for="nom">Nom</label>
                    <input type="text" name="nom" [(ngModel)]="employeurData.nom" class="form-control" id="nom" placeholder="Dupont">
                </div>

                <div class="form-group mb-3">
                    <label for="prenom">Prénom</label>
                    <input type="text" name="prenom" [(ngModel)]="employeurData.prenom" class="form-control" id="prenom" placeholder="Jean">
                </div>

                <div class="form-group mb-3">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" name="email" [(ngModel)]="employeurData.email" class="form-control" id="email" placeholder="contact@entreprise.fr">
                </div>

                <div class="form-group mb-3">
                    <label for="password">Mot de passe</label>
                    <input type="password" name="password" [(ngModel)]="employeurData.motdepasse" class="form-control" id="password" placeholder="Mot de passe">
                </div>

                <div class="form-group mb-3">
                    <label for="confirmPassword">Confirmez votre mot de passe</label>
                    <input type="password" name="confirmPassword" [(ngModel)]="employeurData.confirmPassword" class="form-control" id="confirmPassword" placeholder="Mot de passe">
                </div>

                <div class="form-group mb-3">
                    <label for="telephone">Téléphone</label>
                    <input type="tel" name="telephone" [(ngModel)]="employeurData.telephone" class="form-control" id="telephone" placeholder="XX XX XX XX XX">
                </div>

                <div class="form-group mb-3">
                    <label for="adresse">Adresse de l'entreprise</label>
                    <input type="text" name="adresse" [(ngModel)]="employeurData.adresse" class="form-control" id="adresse" placeholder="Adresse complète">
                </div>

            </div>

            @if (errorMessage) {
                <p style="color: #ff6b6b; font-size: 0.8rem; text-align: center;">{{ errorMessage }}</p>
            }
            
            <div style="display: flex; justify-content: center;">
                <button type="submit" class="btn btn-light">Je crée mon compte</button>
            </div>

        </form>

    </div>
</div>
