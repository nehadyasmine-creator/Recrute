<div class="home-content" style="align-items:center; display:flex; flex-direction:column; color:white; margin-top:2.5%;">
    <h1>Bienvenue sur Recrute!</h1>
    <p>Votre espace de prédilection pour l'emploi des ingénieurs.</p>

    <div class="connexion-card">
        <h4>Connexion</h4>
        <form (ngSubmit)="onLogin()">
            <div class="inputs-group">
                <div class="form-group">
                    <label for="exampleInputEmail1">Adresse e-mail</label>
                    <input type="email" name="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                        [(ngModel)]="loginData.email" placeholder="Entrez votre e-mail">
                </div>
                <div class="form-group">
                    <label for="exampleInputPassword1">Mot de passe</label>
                    <input type="password" name="password" class="form-control" id="exampleInputPassword1"
                        [(ngModel)]="loginData.password" placeholder="Entrez votre mot de passe">
                </div>
            </div>

            @if (errorMessage) {
            <p style="color: #ff6b6b; font-size: 0.8rem; margin-top: 10px;">{{ errorMessage }}</p>
        }
            <!-- mdp : PrenomNom-->

            <button type="submit" class="btn btn-light">Je me connecte</button>
        </form>
    </div>
    <h4>Pas encore de compte?</h4>
    <h4>Je suis...</h4>
    <div class="inscriptions">
        <div class="inscription_card" routerLink="/inscription-candidat">
            <h3 style="margin-top:5%;">Un candidat</h3>
            <h6>à la recherche du poste idéal.</h6>
            <div style=" display: flex ; height: 40%; width: auto; margin-left:2%;  margin-top:30%; margin-bottom: 30%;"><img
                    src="assets/pictos/candidat_picto.png" alt="Logo Recrute"></div>

        </div>
        <div class="inscription_card" routerLink="/inscription-employeur">
            <h3 style="margin-top:5%;">Un employeur</h3>
            <h6>à la recherche du talent idéal.</h6>
            <div style=" display: flex ; height: 40%; width: auto; margin-left:2%; margin-top:30%; margin-bottom: 30%;"><img
                    src="assets/pictos/employeur_picto.png" alt="Logo Recrute"></div>
        </div>
    </div>
</div>
