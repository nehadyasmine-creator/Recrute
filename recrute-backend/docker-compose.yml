services:
  postgres:
    image: postgres:16
    container_name: recrute-db
    environment:
      POSTGRES_DB: recrute
      POSTGRES_USER: recrute_user
      POSTGRES_PASSWORD: recrute_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  adminer:
    image: adminer
    container_name: recrute-adminer
    ports:
      - "8082:8080" 
    depends_on:
      - postgres

volumes:
  postgres_data:

