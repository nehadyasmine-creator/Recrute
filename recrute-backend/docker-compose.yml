services:
  postgres:
    image: postgres:16
    container_name: recrute-db
    environment:
      POSTGRES_DB: recrute
      POSTGRES_USER: recrute_user
      POSTGRES_PASSWORD: recrute_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data.sql:/docker-entrypoint-initdb.d/data.sql
  
  adminer:
    image: adminer
    container_name: recrute-adminer
    ports:
      - "8082:8080" 
    depends_on:
      - postgres
  
  mongodb:
    image: mongo:latest
    container_name: recrute-mongo
    ports:
      - "27017:27017"
    environment:
          MONGO_INITDB_DATABASE: recrute_mongo
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: